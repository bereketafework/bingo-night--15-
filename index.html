<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.1.0/",
        "react": "https://esm.sh/react@^19.1.0",
        "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
        "sql.js": "https://esm.sh/sql.js@1.10.3",
        "peerjs": "https://esm.sh/peerjs@1.5.2",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
    </script>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23111827"></rect><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-size="70" font-weight="bold" fill="%23f59e0b" font-family="sans-serif">B</text></svg>' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bingo Night</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
              '3xl': '1800px',
              '4xl': '2200px',
            },
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Poppins:wght@400;600;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #111827;
        color: #ffffff;
      }
      .font-roboto-mono {
        font-family: 'Roboto Mono', monospace;
      }
      .font-inter {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for a better dark mode experience */
      /* For Webkit Browsers */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #9ca3af;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280; /* bg-gray-500 */
      }
      /* For Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: #9ca3af #1f2937;
      }


      /* Custom Range Input */
      input[type=range] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
        width: 100%;
      }
      input[type=range]:focus {
        outline: none;
      }
      input[type=range]::-webkit-slider-runnable-track {
        background: #374151; /* bg-gray-700 */
        height: 0.5rem;
        border-radius: 0.5rem;
      }
      input[type=range]::-moz-range-track {
        background: #374151; /* bg-gray-700 */
        height: 0.5rem;
        border-radius: 0.5rem;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -6px; /* Centers thumb on the track */
        background-color: #f59e0b;
        height: 1.25rem;
        width: 1.25rem;
        border-radius: 9999px;
        border: 2px solid #111827;
      }
      input[type=range]:focus::-webkit-slider-thumb {
        outline: 3px solid #f59e0b44;
        outline-offset: 0.125rem;
      }
      input[type=range]::-moz-range-thumb {
        border: none;
        border-radius: 9999px;
        background-color: #f59e0b;
        height: 1.25rem;
        width: 1.25rem;
        border: 2px solid #111827;
      }
      input[type=range]:focus::-moz-range-thumb {
        outline: 3px solid #f59e0b44;
        outline-offset: 0.125rem;
      }
      @keyframes fade-in-down {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
      }
      .animate-fade-in-down {
          animation: fade-in-down 0.3s ease-out forwards;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
          animation: fade-in 0.3s ease-out forwards;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
